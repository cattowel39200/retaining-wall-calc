<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우수 수리계산서 프로그램</title>
<style>
:root {
  --primary: #1a56db;
  --primary-light: #e1effe;
  --success: #046c4e;
  --success-bg: #def7ec;
  --danger: #c81e1e;
  --danger-bg: #fde8e8;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-500: #6b7280;
  --gray-700: #374151;
  --gray-900: #111827;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: var(--gray-100); color: var(--gray-900); line-height: 1.6; }
.app { max-width: 1400px; margin: 0 auto; padding: 16px; }
h1 { font-size: 1.5rem; color: var(--primary); margin-bottom: 4px; }
h2 { font-size: 1.15rem; color: var(--gray-700); margin-bottom: 12px; border-bottom: 2px solid var(--primary); padding-bottom: 6px; }
h3 { font-size: 1rem; color: var(--gray-700); margin: 12px 0 8px; }

.header { background: white; padding: 16px 24px; border-radius: var(--radius); margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.1); display: flex; align-items: center; gap: 16px; }
.header-sub { color: var(--gray-500); font-size: .85rem; }

.tabs { display: flex; gap: 4px; background: white; padding: 4px; border-radius: var(--radius); margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.1); flex-wrap: wrap; }
.tab { padding: 10px 20px; border: none; background: none; cursor: pointer; border-radius: 6px; font-size: .9rem; font-weight: 500; color: var(--gray-500); transition: all .2s; }
.tab:hover { background: var(--gray-100); }
.tab.active { background: var(--primary); color: white; }

.panel { background: white; border-radius: var(--radius); padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.1); margin-bottom: 16px; }
.panel.hidden { display: none; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }

.form-group { margin-bottom: 10px; }
.form-group label { display: block; font-size: .82rem; color: var(--gray-500); margin-bottom: 3px; font-weight: 500; }
.form-group input, .form-group select { width: 100%; padding: 8px 10px; border: 1px solid var(--gray-300); border-radius: 6px; font-size: .9rem; outline: none; transition: border .2s; }
.form-group input:focus, .form-group select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,86,219,.1); }
.form-group .unit { font-size: .78rem; color: var(--gray-500); margin-top: 2px; }

.btn { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: .85rem; font-weight: 600; transition: all .2s; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: #1e429f; }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #03543f; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #9b1c1c; }
.btn-outline { background: white; color: var(--primary); border: 1px solid var(--primary); }
.btn-outline:hover { background: var(--primary-light); }
.btn-sm { padding: 5px 12px; font-size: .8rem; }

.btn-group { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

table.data { width: 100%; border-collapse: collapse; font-size: .82rem; }
table.data th, table.data td { border: 1px solid var(--gray-200); padding: 6px 8px; text-align: center; }
table.data th { background: var(--gray-50); font-weight: 600; color: var(--gray-700); }
table.data td.ok { background: var(--success-bg); color: var(--success); font-weight: 700; }
table.data td.ng { background: var(--danger-bg); color: var(--danger); font-weight: 700; }
table.data td.num { text-align: right; font-family: 'Consolas', monospace; }
table.data tr:hover { background: #f0f4ff; }

.result-box { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 6px; padding: 12px 16px; margin: 8px 0; }
.result-box .label { font-size: .8rem; color: var(--gray-500); }
.result-box .value { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
.result-box .sub { font-size: .78rem; color: var(--gray-500); }

.segment-card { border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; position: relative; }
.segment-card .seg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.segment-card .seg-title { font-weight: 700; color: var(--primary); }
.segment-card .seg-num { background: var(--primary); color: white; width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: .85rem; margin-right: 8px; }

.idf-table { margin: 12px 0; }
.coeff-grid { display: grid; grid-template-columns: auto repeat(7, 1fr); gap: 4px; font-size: .8rem; align-items: center; }
.coeff-grid .coeff-label { font-weight: 600; padding: 4px 8px; background: var(--gray-50); border-radius: 4px; }
.coeff-grid input { padding: 4px 6px; border: 1px solid var(--gray-300); border-radius: 4px; font-size: .8rem; width: 100%; text-align: center; }

.alert { padding: 10px 14px; border-radius: 6px; font-size: .85rem; margin: 8px 0; }
.alert-info { background: var(--primary-light); color: var(--primary); }
.alert-success { background: var(--success-bg); color: var(--success); }
.alert-danger { background: var(--danger-bg); color: var(--danger); }

/* ===== Report Styles - A4 세로 (Portrait 210×297mm) ===== */
/* 화면 미리보기: A4 세로 비율 그대로 표시 */
.report {
  width: 210mm; min-height: 297mm;
  margin: 16px auto; padding: 20mm 18mm;
  box-sizing: border-box;
  background: white;
  box-shadow: 0 2px 16px rgba(0,0,0,.15);
  border: 1px solid var(--gray-200);
  overflow: hidden;
  font-size: 10pt; line-height: 1.75;
  font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  color: var(--gray-900);
}
.report .report-title {
  text-align: center; font-size: 14pt; font-weight: 700;
  margin: 14px 0; padding: 8px 10px;
  border: 2px solid var(--gray-900); letter-spacing: 2px;
}
.report .section-title { font-weight: 700; margin-top: 14px; font-size: 11pt; }
.report .formula { font-family: 'Cambria Math', 'Times New Roman', serif; margin: 4px 0 4px 18px; font-size: 10pt; }
.report .indent { margin-left: 20px; }
.report .indent2 { margin-left: 42px; }
.report table { border-collapse: collapse; margin: 6px 0; font-size: 9pt; max-width: 100%; }
.report table th, .report table td { border: 1px solid var(--gray-300); padding: 3px 6px; }
.report table th { background: var(--gray-100); font-size: 8.5pt; }

.ref-table { margin: 8px 0; }
.ref-table th { background: var(--gray-50) !important; font-size: 8pt; }
.ref-table td { font-size: 8pt !important; }

.inline-flex { display: inline-flex; align-items: center; gap: 6px; }

/* ===== 인쇄 스타일 ===== */
@media print {
  body { background: white; margin: 0; padding: 0; }
  .tabs, .header, .no-print { display: none !important; }
  .panel { box-shadow: none; border: none; margin: 0; padding: 0; }
  .report {
    width: 100%; min-height: auto;
    margin: 0; padding: 0;
    box-shadow: none; border: none;
    font-size: 10pt; line-height: 1.7;
  }
  .report .report-title { font-size: 14pt; margin: 10px 0; padding: 7px 8px; }
  .report .section-title { font-size: 11pt; margin-top: 10px; }
  .report .formula { font-size: 10pt; }
  .report table { font-size: 8.5pt; }
  .report table th, .report table td { padding: 2px 5px; }
  .report .indent { margin-left: 18px; }
  .report .indent2 { margin-left: 38px; }
  @page { size: A4 portrait; margin: 18mm 15mm 15mm 15mm; }
}

.tooltip { position: relative; cursor: help; color: var(--primary); }
.tooltip:hover::after { content: attr(data-tip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--gray-900); color: white; padding: 4px 8px; border-radius: 4px; font-size: .75rem; white-space: nowrap; z-index: 10; }

.section-divider { height: 1px; background: var(--gray-200); margin: 16px 0; }

select option { font-size: .9rem; }
</style>
</head>

// 강우강도 계산 (보간법 사용)
function calcRainfallIntensity(t_min, returnPeriod) {
  const durations = Object.keys(getActiveIdfTable()).map(Number).sort((a,b)=>a-b);
  const rp = returnPeriod;

  // 테이블에 해당 빈도가 없으면 가장 가까운 것 사용
  const availableRP = [10, 20, 30, 50];
  let rp1, rp2;
  if (rp <= 10) { return interpolateDuration(t_min, 10); }
  if (rp >= 50) { return interpolateDuration(t_min, 50); }

  for (let i = 0; i < availableRP.length - 1; i++) {
    if (rp >= availableRP[i] && rp <= availableRP[i+1]) {
      rp1 = availableRP[i]; rp2 = availableRP[i+1];
      break;
    }
  }
  const I1 = interpolateDuration(t_min, rp1);
  const I2 = interpolateDuration(t_min, rp2);
  return I1 + (I2 - I1) * (rp - rp1) / (rp2 - rp1);
}

function interpolateDuration(t_min, rp) {
  const durations = Object.keys(getActiveIdfTable()).map(Number).sort((a,b)=>a-b);
  if (t_min <= durations[0]) {
    // 외삽 (power law)
    const t1 = durations[0], t2 = durations[1];
    const I1 = getActiveIdfTable()[t1][rp], I2 = getActiveIdfTable()[t2][rp];
    const n = Math.log(I1/I2) / Math.log(t2/t1);
    return I1 * Math.pow(t1/t_min, n);
  }
  if (t_min >= durations[durations.length-1]) {
    const t1 = durations[durations.length-2], t2 = durations[durations.length-1];
    const I1 = getActiveIdfTable()[t1][rp], I2 = getActiveIdfTable()[t2][rp];
    const n = Math.log(I1/I2) / Math.log(t2/t1);
    return I2 * Math.pow(t2/t_min, n);
  }
  // 내삽 (log-log interpolation)
  for (let i = 0; i < durations.length - 1; i++) {
    if (t_min >= durations[i] && t_min <= durations[i+1]) {
      const t1 = durations[i], t2 = durations[i+1];
      const I1 = getActiveIdfTable()[t1][rp], I2 = getActiveIdfTable()[t2][rp];
      const logRatio = Math.log(t_min/t1) / Math.log(t2/t1);
      return Math.exp(Math.log(I1) + (Math.log(I2) - Math.log(I1)) * logRatio);
    }
  }
  // 보간 범위 밖: 최대 지속시간의 값으로 외삽 (log-log)
  const lastDur = durations[durations.length - 1];
  const lastI = getActiveIdfTable()[lastDur]?.[rp];
  if (lastI && t_min > lastDur) {
    return lastI * Math.pow(lastDur / t_min, 0.5); // 보수적 외삽
  }
  return lastI || 0;
}

// Kerby 유입시간
function calcKerbyTime(L, S, n) {
  if (S <= 0 || L <= 0) return 7; // 기본값 7분
  return 1.44 * Math.pow((L * n / Math.sqrt(S)), 0.467);
}

// 유하시간
function calcTravelTime(L, V, a) {
  if (V <= 0 || a <= 0 || L <= 0) return 0;
  return L / (a * V * 60); // 분 단위
}

// Manning 유속
function calcManningVelocity(n, R, slope) {
  if (n <= 0 || R <= 0 || slope <= 0) return 0;
  return (1/n) * Math.pow(R, 2/3) * Math.pow(slope/100, 0.5);
}

// 원형관 수리특성 (충수율 지원)
function calcCircularPipe(D_mm, n, slope_pct, fillRatio) {
  const D = D_mm / 1000; // m
  const fr = fillRatio || 1.0;
  if (fr >= 1.0) {
    // 만관류
    const A = Math.PI * D * D / 4;
    const P = Math.PI * D;
    const R = D / 4;
    const V = calcManningVelocity(n, R, slope_pct);
    const Q = A * V;
    return { A, P, R, V, Q, type: '원형관', fillRatio: 1.0, fillDesc: '만수' };
  }
  // 부분류: h = fr * D
  const h = fr * D;
  const r = D / 2;
  // acos 입력값을 [-1, 1] 범위로 클램핑 (h > r 또는 h < 0 방지)
  const cosArg = Math.max(-1, Math.min(1, (r - h) / r));
  const theta = 2 * Math.acos(cosArg); // 중심각 (rad)
  const A = (r * r / 2) * (theta - Math.sin(theta));
  const P = r * theta;
  const R = P > 0 ? A / P : 0;
  const V = calcManningVelocity(n, R, slope_pct);
  const Q = A * V;
  return { A, P, R, V, Q, type: '원형관', fillRatio: fr, fillDesc: (fr*100).toFixed(0)+'%충수' };
}

// BOX 암거 수리특성 (통수율 지원)
function calcBoxCulvert(B_m, H_m, n, slope_pct, fillRatio) {
  const fr = fillRatio || 1.0;
  const h = H_m * fr;
  const A = B_m * h;
  const P = (fr >= 1.0) ? 2 * (B_m + H_m) : B_m + 2 * h; // 만수시 폐합, 부분류시 개수로
  const R = P > 0 ? A / P : 0;
  const V = calcManningVelocity(n, R, slope_pct);
  const Q = A * V;
  return { A, P, R, V, Q, type: 'BOX', fillRatio: fr };
}

// 사다리꼴 토사측구 수리특성 (통수율 지원)
function calcTrapezoidalDitch(B_top, B_bot, H, n, slope_pct, fillRatio) {
  const fr = fillRatio || 0.8;
  const h = H * fr; // 실제 통수 깊이
  const m = (B_top - B_bot) / (2 * H); // 측면경사
  const b_eff = B_bot + 2 * m * h; // 통수 깊이에서의 수면폭
  const A = (b_eff + B_bot) * h / 2;
  const sideLength = Math.sqrt(h*h + Math.pow(m*h, 2));
  const P = B_bot + 2 * sideLength;
  const R = P > 0 ? A / P : 0;
  const V = calcManningVelocity(n, R, slope_pct);
  const Q = A * V;
  return { A, P, R, V, Q, type: '토사측구', m, fillRatio: fr, H_full: H, H_flow: h };
}

// U형측구 수리특성 (반원 하부 + 직사각형 상부, 통수율 지원)
function calcUDitch(B_m, H_m, n, slope_pct, fillRatio) {
  const fr = fillRatio || 0.8;
  const h = H_m * fr; // 통수 수심
  const r = B_m / 2;
  let A, P;
  if (h <= r) {
    const theta = 2 * Math.acos((r - h) / r);
    A = (r * r / 2) * (theta - Math.sin(theta));
    P = r * theta;
  } else {
    const A_semi = Math.PI * r * r / 2;
    const P_semi = Math.PI * r;
    const H_rect = h - r;
    A = A_semi + B_m * H_rect;
    P = P_semi + 2 * H_rect;
  }
  const R = P > 0 ? A / P : 0;
  const V = calcManningVelocity(n, R, slope_pct);
  const Q = A * V;
  return { A, P, R, V, Q, type: 'U형측구', fillRatio: fr, H_full: H_m, H_flow: h };
}

// 제형측구 수리특성 (통수율 지원)
function calcJehyungDitch(B_top, B_bot, H, slopeLeft, slopeRight, n, slope_pct, fillRatio) {
  const fr = fillRatio || 0.8;
  const h = H * fr;
  const mL = slopeLeft, mR = slopeRight;
  const b_eff = B_bot + mL * h + mR * h;
  const A = (b_eff + B_bot) * h / 2;
  const leftLen = Math.sqrt(h*h + (mL*h)*(mL*h));
  const rightLen = Math.sqrt(h*h + (mR*h)*(mR*h));
  const P = B_bot + leftLen + rightLen;
  const R = P > 0 ? A / P : 0;
  const V = calcManningVelocity(n, R, slope_pct);
  const Q = A * V;
  return { A, P, R, V, Q, type: '제형측구', slopeLeft, slopeRight, fillRatio: fr, H_full: H, H_flow: h };
}

  const invFrom = parseFloat(seg.invertFrom) || 0;
  const invTo = parseFloat(seg.invertTo) || 0;
  const len = parseFloat(seg.commonLength) || 0;
  if (len > 0 && invFrom > 0 && invTo >= 0) {
    return ((invFrom - invTo) / len) * 100;
  }
  return 0;
}

// 총괄유출계수 산정: C = Σ(Ci × Ai) / ΣAi
function calcWeightedRunoffCoeff(landuses) {
  // landuses: [{coeff, area}]
  let sumCA = 0, sumA = 0;
  landuses.forEach(lu => {
    const c = parseFloat(lu.coeff) || 0;
    const a = parseFloat(lu.area) || 0;
    sumCA += c * a;
    sumA += a;
  });
  return sumA > 0 ? sumCA / sumA : 0;
}

// ============================================================
// 계산 함수
// ============================================================
function getSegDesignFreq(seg, projectFreq) {
  // 구간별 설계빈도: 'project'이면 프로젝트 설정, 아니면 구간 고유값
  if (seg.segDesignFreq && seg.segDesignFreq !== 'project') {
    return parseInt(seg.segDesignFreq);
  }
  return projectFreq;
}

function computeSegment(seg, designFreq) {
  const result = {};
  // 실제 적용 설계빈도 (구간별 또는 프로젝트)
  const effectiveFreq = getSegDesignFreq(seg, designFreq);
  result.designFreq = effectiveFreq;

  // 유역 지형정보 계산
  const elevUpper = parseFloat(seg.elevUpper) || 0;
  const elevLower = parseFloat(seg.elevLower) || 0;
  const channelLen = parseFloat(seg.channelLength) || 0;
  result.elevDiff = elevUpper - elevLower; // 표고차
  result.channelLength = channelLen;
  result.channelSlope = channelLen > 0 ? result.elevDiff / channelLen : 0; // 유로경사

  // 1. 유입시간
  if (seg.inflowTimeMethod === 'kerby') {
    const rawL = parseFloat(seg.kerbyL) || channelLen || 0;
    const kerbyH = result.elevDiff || 0;
    // Kerby L: 경사거리 또는 수평거리
    let kerbyL = rawL;
    if (seg.kerbyLMethod === 'slope' && rawL > 0 && kerbyH > 0) {
      kerbyL = Math.sqrt(kerbyH * kerbyH + rawL * rawL); // 경사거리
    }
    result.kerbyLMethod = seg.kerbyLMethod;
    if (kerbyL > 0 && kerbyH > 0) {
      const S = kerbyH / rawL; // 경사 = 표고차/수평거리 (항상 수평거리 기준)
      result.t1 = calcKerbyTime(kerbyL, S, seg.kerbyN);
      result.kerbyS = S;
      result.kerbyL = kerbyL;
      result.kerbyRawL = rawL;
      result.kerbyH = kerbyH;
    } else {
      result.t1 = 7;
    }
  } else {
    result.t1 = 7;
  }

  // 2. 단면특성 계산
  const _comLen = getSegLength(seg);
  const _comSlope = getSegSlope(seg);
  const _natSlope = calcNaturalSlope(seg);
  const _fr = getFlowRatio(seg);
  result.pipeLength = _comLen;
  result.appliedSlope = _comSlope;
  result.naturalSlope = _natSlope;
  result.flowRatio = _fr;

  let pipeResult;
  if (seg.pipeType === 'circular' && seg.pipeDiameter && _comSlope > 0) {
    pipeResult = calcCircularPipe(parseFloat(seg.pipeDiameter), seg.pipeRoughness, _comSlope, _fr);
  } else if (seg.pipeType === 'box' && seg.boxWidth && seg.boxHeight && _comSlope > 0) {
    pipeResult = calcBoxCulvert(parseFloat(seg.boxWidth), parseFloat(seg.boxHeight), seg.boxRoughness, _comSlope, _fr);
  } else if (seg.pipeType === 'trapezoidal' && seg.ditchTopWidth && seg.ditchBotWidth && seg.ditchDepth && _comSlope > 0) {
    pipeResult = calcTrapezoidalDitch(parseFloat(seg.ditchTopWidth), parseFloat(seg.ditchBotWidth), parseFloat(seg.ditchDepth), seg.ditchRoughness, _comSlope, _fr);
  } else if (seg.pipeType === 'uditch' && seg.uWidth && seg.uHeight && _comSlope > 0) {
    pipeResult = calcUDitch(parseFloat(seg.uWidth), parseFloat(seg.uHeight), seg.uRoughness, _comSlope, _fr);
  } else if (seg.pipeType === 'jehyung' && seg.jhTopWidth && seg.jhBotWidth && seg.jhDepth && _comSlope > 0) {
    pipeResult = calcJehyungDitch(parseFloat(seg.jhTopWidth), parseFloat(seg.jhBotWidth), parseFloat(seg.jhDepth), seg.jhSlopeLeft, seg.jhSlopeRight, seg.jhRoughness, _comSlope, _fr);
  }

  if (pipeResult) {
    result.section = pipeResult;
  } else if (_comSlope <= 0) {
    result.warning = '경사(I)가 0 이하입니다. 관거 표고를 확인하세요.';
  }

  // 3. 유하시간
  if (seg.hasTravelTime && pipeResult && result.pipeLength > 0) {
    result.t2 = calcTravelTime(result.pipeLength, pipeResult.V, seg.travelCorrFactor);
  } else {
    result.t2 = 0;
  }

  // 4. 유달시간
  result.tc = result.t1 + result.t2;

  // 5. 강우강도 (구간별 적용 설계빈도 사용)
  result.intensity = calcRainfallIntensity(result.tc, effectiveFreq);
  result.intensities = {};
  [10, 20, 30, 50].forEach(rp => {
    result.intensities[rp] = calcRainfallIntensity(result.tc, rp);
  });

  // 6. 유출량
  const A = parseFloat(seg.area) || 0;
  const cA = parseFloat(seg.cumulArea) || A;
  result.area = A;
  result.cumulArea = cA;
  // 유출계수 산정
  let _C = seg.runoffCoeff;
  result.runoffMethod = seg.runoffCoeffMethod || 'simple';
  if (seg.runoffCoeffMethod === 'weighted' && seg.runoffLanduses && seg.runoffLanduses.length > 0) {
    _C = calcWeightedRunoffCoeff(seg.runoffLanduses);
    result.weightedC = _C;
    result.landuses = seg.runoffLanduses;
  }
  result.appliedC = _C;
  result.discharge = calcRationalDischarge(_C, result.intensity, cA);

  // 7. 통수능 검토 - 유속기준 (관종별 차등 적용)
  // 근거: 하수도시설기준 - 우수관 최소 0.8m/s, 최대 3.0m/s
  //       하천설계기준 - 개거 최소 0.6m/s, 최대 3.0m/s
  if (pipeResult) {
    const isPipe = (seg.pipeType === 'circular' || seg.pipeType === 'box');
    // 최소유속: 우수관 0.8m/s(하수도시설기준), 개거 0.6m/s(하천설계기준)
    const minV = isPipe ? 0.8 : 0.6;
    // 최대유속: 3.0m/s (하수도시설기준 / 하천설계기준)
    const maxV = 3.0;
    result.minV = minV;
    result.maxV = maxV;
    result.velocityOK = pipeResult.V >= minV && pipeResult.V <= maxV;
    result.capacityOK = pipeResult.Q >= result.discharge;
    // 유속 판정
    if (pipeResult.V < minV) {
      result.velocityCheck = 'NG(저속)';
    } else if (pipeResult.V > maxV) {
      result.velocityCheck = 'NG(과속)';
    } else {
      result.velocityCheck = 'OK';
    }
    result.capacityCheck = pipeResult.Q >= result.discharge ? 'OK' : 'NG';
  }

  // 8. 기존단면 검토
  if (seg.hasExistingSection) {
    const eLen = parseFloat(seg.existLength) || 0;
    let eSlope = 0;
    if (seg.existSlopeMode === 'manual' && seg.existAppliedSlope) {
      eSlope = parseFloat(seg.existAppliedSlope);
    } else if (eLen > 0) {
      const ef = parseFloat(seg.existInvertFrom) || 0;
      const et = parseFloat(seg.existInvertTo) || 0;
      if (ef > 0 && et >= 0) eSlope = ((ef - et) / eLen) * 100;
    }
    const eFr = seg.existFlowRatio || 1.0;
    let existResult = null;
    if (seg.existPipeType === 'circular' && seg.existDiameter && eSlope > 0) {
      existResult = calcCircularPipe(parseFloat(seg.existDiameter), seg.existRoughness, eSlope, eFr);
    } else if (seg.existPipeType === 'box' && seg.existBoxW && seg.existBoxH && eSlope > 0) {
      existResult = calcBoxCulvert(parseFloat(seg.existBoxW), parseFloat(seg.existBoxH), seg.existRoughness, eSlope, eFr);
    } else if (seg.existPipeType === 'uditch' && seg.existUWidth && seg.existUHeight && eSlope > 0) {
      existResult = calcUDitch(parseFloat(seg.existUWidth), parseFloat(seg.existUHeight), seg.existRoughness, eSlope, eFr);
    }
    if (existResult) {
      result.existSection = existResult;
      result.existLength = eLen;
      result.existSlope = eSlope;
      result.existCapacityOK = existResult.Q >= result.discharge;
      result.existCapacityCheck = existResult.Q >= result.discharge ? 'OK' : 'NG';
    }
  }

  return result;
}

function computeAll() {
  return state.segments.map(seg => ({
    segment: seg,
    result: computeSegment(seg, state.project.designFrequency)
  }));
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = renderHeader() + renderTabs() + renderContent();
  bindEvents();
}

function renderHeader() {
  const regionOptions = REGION_LIST.map(r =>
    `<option value="${r}" ${r === currentRegion ? 'selected' : ''}>${r}</option>`
  ).join('');
  return `
    <div class="header">
      <div>
        <h1>우수 수리계산서 프로그램</h1>
        <div class="header-sub">도로배수시설 설계 및 관리지침(국토교통부, 2020) · 하수도시설기준 · 하천설계기준 적용</div>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:12px" class="no-print">
        <div style="display:flex;align-items:center;gap:6px">
          <label style="font-size:.82rem;font-weight:600;color:var(--gray-700);white-space:nowrap">지역</label>
          <select onchange="changeRegion(this.value)" style="padding:6px 10px;border:2px solid var(--primary);border-radius:6px;font-size:.9rem;font-weight:600;color:var(--primary);background:var(--primary-light);cursor:pointer">
            ${regionOptions}
          </select>
        </div>
        <button class="btn btn-outline btn-sm" onclick="exportJSON()">💾 저장</button>
        <button class="btn btn-outline btn-sm" onclick="importJSON()">📂 불러오기</button>
        <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFileImport(event)">
      </div>
    </div>
  `;
}

function changeRegion(region) {
  currentRegion = region;
  state.project.location = region;
  computeAll();
  render();
}

function renderTabs() {
  const tabs = [
    { id: 'input', label: '① 프로젝트 설정' },
    { id: 'segments', label: '② 구간 입력' },
    { id: 'results', label: '③ 계산 결과' },
    { id: 'summary', label: '④ 제원검토표' },
    { id: 'report', label: '⑤ 상세 보고서' }
  ];
  return `
    <div class="tabs no-print">
      ${tabs.map(t => `<button class="tab ${state.activeTab===t.id?'active':''}" onclick="setTab('${t.id}')">${t.label}</button>`).join('')}
    </div>
  `;
}

function renderContent() {
  switch(state.activeTab) {
    case 'input': return renderProjectInput();
    case 'segments': return renderSegments();
    case 'results': return renderResults();
    case 'summary': return renderSummary();
    case 'report': return renderReport();
    default: return '';
  }
}

            <thead><tr><th>단면형상</th><th>수심 80%</th><th>수심 50%</th><th>수심 20%</th></tr></thead>
            <tbody>
              ${CORRECTION_FACTORS.map(r => `
                <tr><td>${r.shape}</td><td>${r.depth80}</td><td>${r.depth50}</td><td>${r.depth20}</td></tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

// ---- 구간 입력 탭 ----
function renderSegments() {
  return `
    <div class="panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 style="margin:0;border:none;padding:0">관거 구간 입력</h2>
        <button class="btn btn-primary" onclick="addSegment()">+ 구간 추가</button>
      </div>
      ${state.segments.length === 0 ? `
        <div style="text-align:center;padding:40px;color:var(--gray-500)">
          <div style="font-size:2rem;margin-bottom:8px">📐</div>
          <div>구간을 추가하여 수리계산을 시작하세요</div>
          <button class="btn btn-primary" style="margin-top:12px" onclick="addSegment()">첫 번째 구간 추가</button>
        </div>
      ` : state.segments.map((seg, idx) => renderSegmentCard(seg, idx)).join('')}
    </div>
  `;
}

function renderSegmentCard(seg, idx) {
  const pipeTypeOptions = `
    <option value="circular" ${seg.pipeType==='circular'?'selected':''}>원형관</option>
    <option value="box" ${seg.pipeType==='box'?'selected':''}>BOX 암거</option>
    <option value="trapezoidal" ${seg.pipeType==='trapezoidal'?'selected':''}>토사측구 (사다리꼴)</option>
    <option value="uditch" ${seg.pipeType==='uditch'?'selected':''}>U형측구</option>
    <option value="jehyung" ${seg.pipeType==='jehyung'?'selected':''}>제형측구</option>
  `;

  let pipeDimFields = '';
  // 자연구배 산출
  const _natSlope = (() => {
    const f = parseFloat(seg.invertFrom) || 0;
    const t = parseFloat(seg.invertTo) || 0;
    const l = parseFloat(seg.commonLength) || 0;
    return (l > 0 && f > 0 && t >= 0) ? ((f - t) / l * 100) : 0;
  })();
  const _defFR = getDefaultFlowRatio(seg.pipeType);
  const _curFR = getFlowRatio(seg);

  const commonPipeRow = `
    <div class="grid4" style="margin-bottom:4px; padding:8px 0; border-bottom:1px dashed var(--gray-300)">
      <div class="form-group">
        <label>기점 관저고 (EL.m)</label>
        <input type="number" step="0.001" value="${seg.invertFrom}" onchange="updateSeg(${idx},'invertFrom',this.value)" placeholder="기점 EL">
      </div>
      <div class="form-group">
        <label>종점 관저고 (EL.m)</label>
        <input type="number" step="0.001" value="${seg.invertTo}" onchange="updateSeg(${idx},'invertTo',this.value)" placeholder="종점 EL">
      </div>
      <div class="form-group">
        <label>관거 연장 (m)</label>
        <input type="number" step="0.1" value="${seg.commonLength}" onchange="updateSeg(${idx},'commonLength',this.value)" placeholder="연장">
      </div>
      <div class="form-group">
        <label>자연구배 (%)</label>
        <input type="text" value="${_natSlope > 0 ? _natSlope.toFixed(3) : '-'}" disabled style="background:var(--gray-100);color:var(--gray-500)">
      </div>
    </div>
    <div class="grid4" style="margin-bottom:8px; padding:4px 0; border-bottom:1px dashed var(--gray-300)">
      <div class="form-group">
        <label>구배 적용방식</label>
        <select onchange="updateSeg(${idx},'slopeMode',this.value); render()">
          <option value="auto" ${seg.slopeMode==='auto'?'selected':''}>자동 (관저고 기반)</option>
          <option value="manual" ${seg.slopeMode==='manual'?'selected':''}>적용구배 직접입력</option>
        </select>
      </div>
      ${seg.slopeMode === 'manual' ? `
        <div class="form-group">
          <label>적용구배 (%) <span style="color:var(--danger);font-weight:700">직접입력</span></label>
          <input type="number" step="0.001" value="${seg.appliedSlope}" onchange="updateSeg(${idx},'appliedSlope',this.value)" style="border-color:var(--danger)">
        </div>
      ` : `
        <div class="form-group">
          <label>적용구배 (%) <span style="color:var(--primary);font-weight:700">자동</span></label>
          <input type="text" value="${_natSlope > 0 ? _natSlope.toFixed(3) : '-'}" disabled style="background:var(--gray-100);color:var(--primary);font-weight:700">
        </div>
      `}
      <div class="form-group">
        <label>통수율</label>
        <select onchange="updateSeg(${idx},'flowRatio',this.value); render()">
          <option value="auto" ${seg.flowRatio==='auto'?'selected':''}>기본 (${(_defFR*100).toFixed(0)}% - ${_defFR < 1 ? '여유고'+(100-_defFR*100)+'%' : '만수'})</option>
          <option value="manual" ${seg.flowRatio==='manual'?'selected':''}>직접입력</option>
        </select>
      </div>
      ${seg.flowRatio === 'manual' ? `
        <div class="form-group">
          <label>통수율 직접입력 (0~1)</label>
          <input type="number" step="0.05" min="0.1" max="1" value="${seg.flowRatioValue || _defFR}" onchange="updateSeg(${idx},'flowRatioValue',this.value)">
        </div>
      ` : `
        <div class="form-group">
          <label>적용 통수율</label>
          <input type="text" value="${(_curFR*100).toFixed(0)}%" disabled style="background:var(--gray-100);font-weight:700;color:var(--primary)">
        </div>
      `}
    </div>
  `;

  if (seg.pipeType === 'circular') {
    pipeDimFields = commonPipeRow + `
      <div class="grid4">
        <div class="form-group">
          <label>관경 (mm)</label>
          <input type="number" value="${seg.pipeDiameter}" onchange="updateSeg(${idx},'pipeDiameter',this.value)">
        </div>
        ${buildMaterialSelect(idx, seg)}
      </div>
    `;
  } else if (seg.pipeType === 'box') {
    pipeDimFields = commonPipeRow + `
      <div class="grid4">
        <div class="form-group">
          <label>폭 B (m)</label>
          <input type="number" step="0.1" value="${seg.boxWidth}" onchange="updateSeg(${idx},'boxWidth',this.value)">
        </div>
        <div class="form-group">
          <label>높이 H (m)</label>
          <input type="number" step="0.1" value="${seg.boxHeight}" onchange="updateSeg(${idx},'boxHeight',this.value)">
        </div>
        ${buildMaterialSelect(idx, seg)}
      </div>
    `;
  } else if (seg.pipeType === 'trapezoidal') {
    pipeDimFields = commonPipeRow + `
      <div class="grid4">
        <div class="form-group">
          <label>상폭 B (m)</label>
          <input type="number" step="0.1" value="${seg.ditchTopWidth}" onchange="updateSeg(${idx},'ditchTopWidth',this.value)">
        </div>
        <div class="form-group">
          <label>하폭 b (m)</label>
          <input type="number" step="0.1" value="${seg.ditchBotWidth}" onchange="updateSeg(${idx},'ditchBotWidth',this.value)">
        </div>
        <div class="form-group">
          <label>깊이 H (m)</label>
          <input type="number" step="0.1" value="${seg.ditchDepth}" onchange="updateSeg(${idx},'ditchDepth',this.value)">
        </div>
      </div>
      <div class="grid4">
        ${buildMaterialSelect(idx, seg)}
      </div>
      <div class="alert alert-info" style="font-size:.78rem;padding:6px 10px">단면: 사다리꼴 | A=(B+b)×H/2 | P=b+2×√(H²+((B-b)/2)²)</div>
    `;
  } else if (seg.pipeType === 'uditch') {
    pipeDimFields = commonPipeRow + `
      <div class="grid4">
        <div class="form-group">
          <label>내폭 B (m)</label>
          <input type="number" step="0.01" value="${seg.uWidth}" onchange="updateSeg(${idx},'uWidth',this.value)">
        </div>
        <div class="form-group">
          <label>깊이 H (m)</label>
          <input type="number" step="0.01" value="${seg.uHeight}" onchange="updateSeg(${idx},'uHeight',this.value)">
        </div>
        ${buildMaterialSelect(idx, seg)}
      </div>
      <div class="alert alert-info" style="font-size:.78rem;padding:6px 10px">
        단면: 하부 반원(r=B/2) + 상부 직사각형 | 반원부 A=πr²/2, P=πr | 직사각형부 A=B×(H-r), P=2×(H-r)
      </div>
    `;
  } else if (seg.pipeType === 'jehyung') {
    pipeDimFields = commonPipeRow + `
      <div class="grid4">
        <div class="form-group">
          <label>상폭 B (m)</label>
          <input type="number" step="0.01" value="${seg.jhTopWidth}" onchange="updateSeg(${idx},'jhTopWidth',this.value)">
        </div>
        <div class="form-group">
          <label>하폭 b (m)</label>
          <input type="number" step="0.01" value="${seg.jhBotWidth}" onchange="updateSeg(${idx},'jhBotWidth',this.value)">
        </div>
        <div class="form-group">
          <label>깊이 H (m)</label>
          <input type="number" step="0.01" value="${seg.jhDepth}" onchange="updateSeg(${idx},'jhDepth',this.value)">
        </div>
      </div>
      <div class="grid4">
        ${buildMaterialSelect(idx, seg)}
        <div class="form-group">
          <label>좌측 경사 (1:m)</label>
          <input type="number" step="0.1" value="${seg.jhSlopeLeft}" onchange="updateSeg(${idx},'jhSlopeLeft',parseFloat(this.value))">
          <div class="unit">수직:수평 = 1:m</div>
        </div>
        <div class="form-group">
          <label>우측 경사 (1:m)</label>
          <input type="number" step="0.1" value="${seg.jhSlopeRight}" onchange="updateSeg(${idx},'jhSlopeRight',parseFloat(this.value))">
          <div class="unit">수직:수평 = 1:m</div>
        </div>
      </div>
      <div class="alert alert-info" style="font-size:.78rem;padding:6px 10px">
        단면: 좌우 경사가 다를 수 있는 사다리꼴 | A=(B+b)×H/2 | P=b+√(H²+(m₁H)²)+√(H²+(m₂H)²)
      </div>
    `;
  }

  return `
    <div class="segment-card">
      <div class="seg-header">
        <div>
          <span class="seg-num">${idx+1}</span>
          <span class="seg-title">구간 ${idx+1}${seg.name ? ` - ${seg.name}` : ''}</span>
        </div>
        <div>
          <button class="btn btn-outline btn-sm" onclick="duplicateSegment(${idx})">복제</button>
          <button class="btn btn-danger btn-sm" onclick="removeSegment(${idx})">삭제</button>
        </div>
      </div>

      <!-- 기본 정보 -->
      <div class="grid4">
        <div class="form-group">
          <label>구간명</label>
          <input value="${seg.name}" onchange="updateSeg(${idx},'name',this.value)" placeholder="예: MH-1-01">
        </div>
        <div class="form-group">
          <label>유역번호</label>
          <input value="${seg.watershed}" onchange="updateSeg(${idx},'watershed',this.value)" placeholder="예: 1">
        </div>
        <div class="form-group">
          <label>유입맨홀</label>
          <input value="${seg.manholeFrom}" onchange="updateSeg(${idx},'manholeFrom',this.value)">
        </div>
        <div class="form-group">
          <label>후속맨홀</label>
          <input value="${seg.manholeTo}" onchange="updateSeg(${idx},'manholeTo',this.value)">
        </div>
      </div>
      <div class="grid4" style="margin-top:4px">
        <div class="form-group">
          <label>설계빈도 (구간별)</label>
          <select onchange="updateSeg(${idx},'segDesignFreq',this.value); render()">
            <option value="project" ${(seg.segDesignFreq||'project')==='project'?'selected':''}>프로젝트 설정 (${state.project.designFrequency}년)</option>
            <option value="10" ${seg.segDesignFreq==='10'||seg.segDesignFreq===10?'selected':''}>10년 (측구)</option>
            <option value="20" ${seg.segDesignFreq==='20'||seg.segDesignFreq===20?'selected':''}>20년 (노면/산지측구)</option>
            <option value="30" ${seg.segDesignFreq==='30'||seg.segDesignFreq===30?'selected':''}>30년 (배수관/암거/수로)</option>
            <option value="50" ${seg.segDesignFreq==='50'||seg.segDesignFreq===50?'selected':''}>50년 (산지부/도시수로)</option>
          </select>
          <div class="unit">도로배수시설지침: 시설물유형별 설계빈도 차등적용</div>
        </div>
      </div>

      <div class="section-divider"></div>

      <!-- 유역조건 -->
      <h3>유역조건 및 지형</h3>
      <div class="grid4">
        <div class="form-group">
          <label>유역면적 (ha)</label>
          <input type="number" step="0.001" value="${seg.area}" onchange="updateSeg(${idx},'area',this.value)">
        </div>
        <div class="form-group">
          <label>누가면적 (ha)</label>
          <input type="number" step="0.001" value="${seg.cumulArea}" onchange="updateSeg(${idx},'cumulArea',this.value)" placeholder="미입력시 유역면적 사용">
        </div>
        <div class="form-group" style="grid-column:span 2">
          <label>유출계수 (C) 산정방식</label>
          <div class="inline-flex" style="flex-wrap:wrap;gap:8px">
            <select style="width:auto" onchange="updateSeg(${idx},'runoffCoeffMethod',this.value); render()">
              <option value="simple" ${(seg.runoffCoeffMethod||'simple')==='simple'?'selected':''}>간편법 (총괄유출계수 직접선택)</option>
              <option value="weighted" ${seg.runoffCoeffMethod==='weighted'?'selected':''}>원칙법 (토지이용별 가중평균)</option>
            </select>
            <div class="unit" style="font-weight:700;color:var(--primary)">적용 C = ${seg.runoffCoeffMethod === 'weighted' && seg.runoffLanduses && seg.runoffLanduses.length > 0 ? calcWeightedRunoffCoeff(seg.runoffLanduses).toFixed(3) : seg.runoffCoeff}</div>
          </div>

          ${(seg.runoffCoeffMethod||'simple') === 'simple' ? `
          <div style="margin-top:6px">
            <select onchange="
              const v = this.value;
              if (v === 'custom') {
                const cv = prompt('유출계수 직접입력 (0~1):', '0.85');
                if (cv !== null) {
                  const nv = parseFloat(cv);
                  updateSeg(${idx},'runoffCoeff',nv);
                  updateSeg(${idx},'runoffCoeffType','custom_'+nv);
                }
              } else {
                const nv = parseFloat(v.split('_').slice(2).join('_'));
                updateSeg(${idx},'runoffCoeff',nv);
                updateSeg(${idx},'runoffCoeffType',v);
              }
              render();
            ">
              ${RUNOFF_COEFFICIENTS.map((rc, ri) => {
                const optVal = 'rc_' + ri + '_' + rc.typical;
                const sel = seg.runoffCoeffType === optVal ? 'selected' : '';
                return '<option value="' + optVal + '" ' + sel + '>' + rc.landuse + ' (C=' + rc.typical + ')</option>';
              }).join('')}
              <option value="custom" ${seg.runoffCoeffType && seg.runoffCoeffType.startsWith('custom') ? 'selected' : ''}>직접입력 (C=${seg.runoffCoeff})</option>
            </select>
          </div>
          ` : `
          <div style="margin-top:6px;border:1px solid var(--gray-200);border-radius:6px;padding:8px">
            <div style="font-size:.78rem;color:var(--gray-500);margin-bottom:6px">C(총괄) = Σ(Ci × Ai) / ΣAi — 토지이용별 기초유출계수와 면적을 입력하세요</div>
            <table class="data" style="font-size:.82rem;margin-bottom:6px">
              <thead><tr><th>토지이용</th><th>기초유출계수 (Ci)</th><th>면적 (Ai, m²)</th><th></th></tr></thead>
              <tbody>
                ${(seg.runoffLanduses||[]).map((lu, li) => `
                  <tr>
                    <td>
                      <select style="font-size:.82rem" onchange="
                        const bi = parseInt(this.value);
                        state.segments[${idx}].runoffLanduses[${li}].baseIdx = bi;
                        state.segments[${idx}].runoffLanduses[${li}].coeff = BASE_RUNOFF_COEFFICIENTS[bi].typical;
                        state.segments[${idx}].runoffLanduses[${li}].landuse = BASE_RUNOFF_COEFFICIENTS[bi].landuse;
                        render();
                      ">
                        ${BASE_RUNOFF_COEFFICIENTS.map((bc, bi) => '<option value="' + bi + '" ' + (lu.baseIdx===bi?'selected':'') + '>' + bc.landuse + '</option>').join('')}
                      </select>
                    </td>
                    <td><input type="number" step="0.01" min="0" max="1" value="${lu.coeff}" style="width:80px;font-size:.82rem"
                      onchange="state.segments[${idx}].runoffLanduses[${li}].coeff=parseFloat(this.value); render()"></td>
                    <td><input type="number" step="1" value="${lu.area||''}" style="width:100px;font-size:.82rem" placeholder="m²"
                      onchange="state.segments[${idx}].runoffLanduses[${li}].area=parseFloat(this.value); render()"></td>
                    <td><button class="btn btn-sm" style="color:var(--danger);font-size:.78rem" onclick="state.segments[${idx}].runoffLanduses.splice(${li},1); render()">삭제</button></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
            <button class="btn btn-sm" onclick="
              if(!state.segments[${idx}].runoffLanduses) state.segments[${idx}].runoffLanduses=[];
              state.segments[${idx}].runoffLanduses.push({baseIdx:0, coeff:BASE_RUNOFF_COEFFICIENTS[0].typical, area:'', landuse:BASE_RUNOFF_COEFFICIENTS[0].landuse});
              render();
            ">+ 토지이용 추가</button>
            ${(seg.runoffLanduses||[]).length > 0 ? (() => {
              const wc = calcWeightedRunoffCoeff(seg.runoffLanduses);
              const totalA = seg.runoffLanduses.reduce((s,l) => s + (parseFloat(l.area)||0), 0);
              return '<div style="margin-top:8px;padding:6px 10px;background:var(--primary-light);border-radius:4px;font-size:.85rem">' +
                '<b>총괄유출계수 C = ' + wc.toFixed(3) + '</b> (총면적: ' + totalA.toFixed(0) + ' m²)</div>';
            })() : ''}
          </div>
          `}
        </div>
      </div>
      <div class="grid4">
        <div class="form-group">
          <label>상부표고 (EL.m)</label>
          <input type="number" step="0.01" value="${seg.elevUpper}" onchange="updateSeg(${idx},'elevUpper',this.value)" placeholder="유역 최고점 표고">
        </div>
        <div class="form-group">
          <label>하부표고 (EL.m)</label>
          <input type="number" step="0.01" value="${seg.elevLower}" onchange="updateSeg(${idx},'elevLower',this.value)" placeholder="유역 최저점 표고">
        </div>
        <div class="form-group">
          <label>유로연장 (m)</label>
          <input type="number" step="0.1" value="${seg.channelLength}" onchange="updateSeg(${idx},'channelLength',this.value)" placeholder="유역 내 유로 길이">
        </div>
        <div class="form-group">
          <div class="result-box" style="padding:6px 10px;margin:0;background:${(parseFloat(seg.elevUpper)&&parseFloat(seg.elevLower)&&parseFloat(seg.channelLength))?'var(--success-bg)':'var(--gray-50)'}">
            <div class="label">표고차 / 유로경사</div>
            <div style="font-size:.9rem;font-weight:600;color:var(--gray-700)">
              ${(parseFloat(seg.elevUpper)&&parseFloat(seg.elevLower)) ?
                `H=${(parseFloat(seg.elevUpper)-parseFloat(seg.elevLower)).toFixed(1)}m` : 'H= -'}
              ${(parseFloat(seg.elevUpper)&&parseFloat(seg.elevLower)&&parseFloat(seg.channelLength)) ?
                ` / S=${((parseFloat(seg.elevUpper)-parseFloat(seg.elevLower))/parseFloat(seg.channelLength)).toFixed(4)}` : ''}
            </div>
          </div>
        </div>
      </div>

      <div class="section-divider"></div>

      <!-- 유달시간 -->
      <h3>유달시간 산정</h3>
      <div class="grid2">
        <div>
          <div class="form-group">
            <label>① 유입시간 산정방식</label>
            <select onchange="updateSeg(${idx},'inflowTimeMethod',this.value)">
              <option value="kerby" ${seg.inflowTimeMethod==='kerby'?'selected':''}>Kerby 공식 (자동산정)</option>
              <option value="default" ${seg.inflowTimeMethod==='default'?'selected':''}>기본 7분 (하수도시설기준)</option>
            </select>
          </div>
        </div>
        <div>
          ${(() => {
            // 유입시간 미리계산
            let t1_preview = 7;
            if (seg.inflowTimeMethod === 'kerby') {
              const kL = parseFloat(seg.kerbyL) || parseFloat(seg.channelLength) || 0;
              const kH = (parseFloat(seg.elevUpper)||0) - (parseFloat(seg.elevLower)||0);
              if (kL > 0 && kH > 0) {
                const kS = kH / kL;
                t1_preview = 1.44 * Math.pow((kL * seg.kerbyN / Math.sqrt(kS)), 0.467);
              }
            }
            return '<div class="result-box" style="padding:6px 10px;margin:0"><div class="label">유입시간 (t₁)</div><div style="font-size:1rem;font-weight:700;color:var(--primary)">' + t1_preview.toFixed(2) + ' 분</div></div>';
          })()}
        </div>
      </div>
      ${seg.inflowTimeMethod === 'kerby' ? (() => {

        const _kUseL = seg.kerbyLMethod === 'slope' ? _kSlopeL : _kRawL;

          <div class="form-group">
            <label>표고차 H / 경사 S</label>

          <div class="form-group">

            </select>
          </div>
        </div>
        <div class="alert alert-info" style="font-size:.78rem;padding:6px 10px">
          Kerby식: t₁ = 1.44×(L×n/S<sup>0.5</sup>)<sup>0.467</sup> | 적용L=${_kUseL.toFixed(1)}m (${seg.kerbyLMethod==='slope'?'경사거리':'수평거리'}), H=${_kH.toFixed(1)}m, n=${seg.kerbyN}
        </div>`;
      })() : ''}

      <div style="margin-top:12px">

          <div>
            <div class="form-group">

                <input type="checkbox" ${seg.hasTravelTime?'checked':''} onchange="updateSeg(${idx},'hasTravelTime',this.checked)">

          ${seg.hasTravelTime ? `
            <div>

        </div>
        ${seg.hasTravelTime ? `

              <input type="number" value="${seg.travelPipeLength}" onchange="updateSeg(${idx},'travelPipeLength',this.value)" placeholder="관거연장 자동사용">
            </div>
            <div class="form-group">
              <label>보정계수 (a)</label>
              <select onchange="updateSeg(${idx},'travelCorrFactor',parseFloat(this.value))">
                <option value="1.25" ${seg.travelCorrFactor===1.25?'selected':''}>정사각형 80% (1.25)</option>
                <option value="1.33" ${seg.travelCorrFactor===1.33?'selected':''}>정사각형/원형 50% (1.33)</option>
                <option value="1.03" ${seg.travelCorrFactor===1.03?'selected':''}>원형 80% (1.03)</option>

                <option value="1.48" ${seg.travelCorrFactor===1.48?'selected':''}>정사각형 20% (1.48)</option>

      <div class="section-divider"></div>

      <!-- 관거제원 -->

      ${seg.hasExistingSection ? `

          <div class="grid4">
            <div class="form-group">
              <label>관종</label>
              <select onchange="updateSeg(${idx},'existPipeType',this.value); render()">

function renderResults() {

            <div class="label">통수능 (Qi)</div>
            <div class="value">${section.Q.toFixed(3)} m³/s</div>

        ${section ? `
        <div style="margin-top:12px">
          <h4 style="font-size:.9rem;margin:0 0 4px;color:var(--gray-700)">계획단면 검토 (통수율 ${(r.flowRatio*100).toFixed(0)}%, 구배 ${r.appliedSlope.toFixed(3)}%)</h4>

            <thead>
              <tr><th>항목</th><th>단면적 (m²)</th><th>윤변 (m)</th><th>경심 (m)</th><th>유속 (m/s)</th><th>통수량 (m³/s)</th><th>유속검토</th><th>유량검토</th></tr>
            </thead>
            <tbody>
              <tr>
                <td>${section.type} ${dimStr}</td>
                <td class="num">${section.A.toFixed(4)}</td>
                <td class="num">${section.P.toFixed(4)}</td>
                <td class="num">${section.R.toFixed(4)}</td>

            </tbody>
          </table>
        </div>

        ${r.existSection ? `
        <div style="margin-top:12px">
          <h4 style="font-size:.9rem;margin:0 0 4px;color:var(--gray-700)">기존단면 검토 (충수율 ${(r.existSection.fillRatio*100||100).toFixed(0)}%, 구배 ${r.existSlope.toFixed(3)}%)</h4>
          <table class="data">
            <thead>
              <tr><th>항목</th><th>단면적 (m²)</th><th>윤변 (m)</th><th>경심 (m)</th><th>유속 (m/s)</th><th>통수량 (m³/s)</th><th>유량검토</th></tr>

              <tr>
                <td>기존 ${r.existSection.type}</td>
                <td class="num">${r.existSection.A.toFixed(4)}</td>

              </tr>

          </table>
        </div>

            <thead><tr><th>빈도</th>${[10,20,30,50].map(rp=>`<th>${rp}년</th>`).join('')}</tr></thead>
            <tbody><tr><td>I (mm/hr)</td>${[10,20,30,50].map(rp=>`<td class="num">${r.intensities[rp].toFixed(2)}</td>`).join('')}</tr></tbody>
          </table>
        </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

        </tbody>
      </table>
      <div class="indent" style="font-size:.78rem;color:var(--gray-500)">※ 개거(開渠)는 계획홍수위 이상의 여유고를 확보하여야 하며, 일반적으로 통수단면의 80%로 산정 (하천설계기준)</div>

      <table style="margin:8px 30px">
        <thead><tr><th>구분</th><th>최소유속 (m/s)</th><th>최대유속 (m/s)</th><th>근거</th></tr></thead>

      </table>
      <div class="indent" style="font-size:.78rem;color:var(--gray-500)">※ 최소유속: 관내 퇴적물 방지 (하수도시설기준 - 우수관 0.8m/s, 개거 0.6m/s)</div>

        <tbody>
          <tr><td>원형관 (만수)</td><td>πD²/4</td><td>πD</td><td>D/4</td></tr>
          <tr><td>원형관 (부분류 h)</td><td>(r²/2)(θ-sinθ)</td><td>rθ</td><td>A/P</td></tr>
          <tr><td>BOX (B×H)</td><td>B × H</td><td>B + 2H</td><td>BH/(B+2H)</td></tr>
          <tr><td>U형측구 (B×H)</td><td>B × H</td><td>B + 2H</td><td>BH/(B+2H)</td></tr>
          <tr><td>사다리꼴 (B,b,H)</td><td>(B+b)×H/2</td><td>b + 2×√(H²+((B-b)/2)²)</td><td>A/P</td></tr>
        </tbody>
      </table>
      <div class="indent" style="font-size:.78rem;margin-top:4px;color:var(--gray-500)">※ 원형관 부분류: θ = 2×acos((r-h)/r), r=D/2, h=충수심</div>
    </div>
  `;
}

// ---- 상세 보고서 탭 ----
function renderReport() {
  if (state.segments.length === 0) {
    return '<div class="panel"><div style="text-align:center;padding:30px;color:var(--gray-500)">구간을 먼저 입력해주세요.</div></div>';
  }

  const computed = computeAll();
  const freq = state.project.designFrequency;

  return `
    <div class="panel no-print">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h2 style="margin:0;border:none;padding:0">상세 수리계산서 보고서</h2>
        <button class="btn btn-primary btn-sm" onclick="window.print()">🖨️ 인쇄</button>
      </div>
      <div class="alert alert-info">
        아래 보고서는 표지, 일반사항, 배수설계기준, 참고자료 및 구간별 상세 수리계산서를 포함합니다.<br>
        인쇄 버튼을 눌러 PDF로 저장하거나 인쇄할 수 있습니다.
      </div>
    </div>

    ${renderReportCover()}
    ${renderReportGeneral()}
    ${renderReportReference()}

    <div class="panel report" style="page-break-after:always">
      <div class="report-title">IV. 구 간 별 수 리 계 산</div>
      <div class="indent">○ 검토구간수 : ${state.segments.length}개 구간</div>
      <div class="indent">○ 기본 설계빈도 : ${freq}년 (구간별 차등 적용)</div>
      <table style="margin:15px 30px;font-size:.85rem">
        <thead><tr><th>No.</th><th>구간명</th><th>유역면적(ha)</th><th>관종</th><th>제원</th></tr></thead>
        <tbody>
          ${computed.map(({segment: seg}, i) => {
            const dim = getDimStr(seg);
            const typeNames = {circular:'원형관', box:'BOX', trapezoidal:'토사측구', uditch:'U형측구', jehyung:'제형측구'};
            return '<tr><td style="text-align:center">' + (i+1) + '</td><td>' + (seg.name||'-') +
              '</td><td style="text-align:right">' + (seg.cumulArea || seg.area || '-') +
              '</td><td style="text-align:center">' + (typeNames[seg.pipeType]||seg.pipeType) +
              '</td><td>' + dim + '</td></tr>';
          }).join('')}
        </tbody>
      </table>
    </div>

    ${computed.map(({segment: seg, result: r}, idx) => renderSegmentReport(seg, r, idx, r.designFreq || freq)).join('')}
  `;
}

function renderSegmentReport(seg, r, idx, freq) {
  const s = r.section;
  const dimStr = getDimStr(seg);
  const n_val = getSegNval(seg);
  const length = getSegLength(seg);
  const slope = getSegSlope(seg);

  // 유출계수 적용값
  const _appliedC = r.appliedC || seg.runoffCoeff;
  const _isWeighted = r.runoffMethod === 'weighted' && r.landuses && r.landuses.length > 0;

  return `
    <div class="panel report" style="page-break-before:always">
      <div class="report-title">유 역 우 수 수 리 계 산 서</div>

      <div class="section-title">1. 위 치</div>
      <div class="indent">○ 대상지 위치 : ${state.project.location} ${seg.name || ''}</div>
      <div class="indent">○ 유역면적 (A) = ${r.cumulArea ? r.cumulArea.toFixed(2) : '-'} ha</div>
      ${r.channelLength ? `<div class="indent">○ 유로연장 (L) = ${r.channelLength.toFixed(0)} m</div>` : ''}
      ${r.elevDiff ? `<div class="indent">○ 표 고 차 (H) = ${r.elevDiff.toFixed(1)} m (EL.${seg.elevUpper} ~ EL.${seg.elevLower})</div>` : ''}
      <div class="indent">○ 설계빈도 (y) = ${freq} 년${seg.segDesignFreq && seg.segDesignFreq !== 'project' ? ' <span style="color:var(--primary);font-size:9pt">(구간별 적용)</span>' : ''}</div>

      <div class="section-title" style="margin-top:20px">2. 유역조건</div>
      ${r.channelLength ? `
        <div class="indent">유역면적 (A) = ${r.cumulArea ? r.cumulArea.toFixed(2) : '-'} ha</div>
        <div class="indent">유로연장 (L) = ${r.channelLength.toFixed(0)} m</div>
        <div class="indent">표 고 차 (H) = ${r.elevDiff ? r.elevDiff.toFixed(1) : '-'} m</div>
      ` : ''}

      <div class="section-title" style="margin-top:20px">3. 유달시간산정 (min)</div>
      ${seg.inflowTimeMethod === 'kerby' && r.kerbyL && r.kerbyH ? `
        <div class="indent">① 유입시간 (t₁) --- Kerby 식 적용</div>
        <div class="formula">t₁ = 1.44 × ( L × n / S<sup>1/2</sup> )<sup>0.467</sup> = <b>${r.t1.toFixed(2)} min</b></div>
        <div class="indent2">L : 지표면거리 (m) = ${r.kerbyL.toFixed(0)} m ${r.kerbyLMethod === 'slope' ? '(경사거리 √(H²+L²) 적용)' : '(수평거리)'}</div>
        <div class="indent2">S : 지표면의 경사 ( H / L ) = ${r.kerbyH.toFixed(1)} / ${r.kerbyL.toFixed(0)} = ${r.kerbyS ? r.kerbyS.toFixed(6) : '-'}</div>
        <div class="indent2">n : 조도계수와 비슷한 지체계수 = ${seg.kerbyN}</div>
      ` : `
        <div class="indent">○ 하수도시설기준(환경부)에서 제시한 평균 유입시간(7분)을 유달시간으로 하여 적용.</div>
      `}

      ${r.t2 > 0 ? `
        <div class="indent" style="margin-top:8px">② 유하시간 (t₂)</div>
        <div class="formula">t₂ = L / ( a × V ) = ${(parseFloat(seg.travelPipeLength)||length).toFixed(0)} / ( ${seg.travelCorrFactor} × ${s ? s.V.toFixed(2) : '0'} × 60 ) = <b>${r.t2.toFixed(2)} min</b></div>
        <div class="indent2">L : 관거연장 = ${(parseFloat(seg.travelPipeLength)||length).toFixed(0)} m</div>
        <div class="indent2">V : Manning공식에 의한 평균유속 = ${s ? s.V.toFixed(2) : '-'} m/sec</div>
        <div class="indent2">a : 홍수의 이동속도에 대한 보정계수 = ${seg.travelCorrFactor}</div>
      ` : ''}

      <div class="formula" style="margin-top:8px"><b>∴ 유달시간 t = t₁ + t₂ = ${r.t1.toFixed(2)} + ${r.t2.toFixed(2)} = ${r.tc.toFixed(2)} min</b></div>

      <div class="section-title" style="margin-top:20px">4. 강우강도 (mm/hr)</div>
      <div class="indent">빈도별 강우강도 (${currentRegion})</div>
      <table style="margin-left:30px">
        <thead><tr><th>구분</th>${[10,20,30,50].map(rp=>`<th>${rp}년</th>`).join('')}</tr></thead>
        <tbody><tr><td>I (mm/hr)</td>${[10,20,30,50].map(rp=>`<td style="text-align:right">${r.intensities[rp].toFixed(2)}</td>`).join('')}</tr></tbody>
      </table>
      <div class="formula" style="margin-top:8px"><b>∴ ${freq}년 빈도일때 강우강도 = ${r.intensity.toFixed(2)} mm/hr</b></div>
      <div class="indent" style="font-size:.78rem;color:var(--gray-500)">*${currentRegion} 하수도 정비 기본계획(변경) 보고서 2013.04, ${currentRegion}</div>

      <div class="section-title" style="margin-top:20px">5. 유출량 (m³/sec)</div>
      <div class="indent">① 유역면적에 따른 적용식 유형</div>
      <div class="indent2">ⓐ A ≤ 4.0 km² -------------- 합리식</div>
      <div class="indent2" style="margin-left:80px">Qd = 1/360 × C × I × A</div>
      <div class="indent2">ⓑ 4.0 km² < A ≤ 40.0 km² ----- 표준유출법</div>
      <div class="indent2">ⓒ A > 40.0 km² --------------- 수문곡선 추적법</div>

      <div class="indent" style="margin-top:8px">② 적용식</div>
      <div class="indent2">A < 4.0 km² 이므로 합리식 채택</div>

      <div class="indent" style="margin-top:8px">합리식에 의한 C 값</div>
      ${_isWeighted ? `
        <div class="indent2">유출계수 산정방식 : <b>원칙법 (토지이용별 가중평균)</b></div>
        <div class="indent2">C(총괄) = Σ(Ci × Ai) / ΣAi</div>
        <table style="margin-left:30px;font-size:.85rem">
          <thead><tr><th>토지이용</th><th>기초유출계수 (Ci)</th><th>면적 (Ai, m²)</th><th>Ci × Ai</th></tr></thead>
          <tbody>
            ${r.landuses.map(lu =>
              '<tr><td>' + (lu.landuse||'-') + '</td><td style="text-align:center">' + (parseFloat(lu.coeff)||0).toFixed(2) +
              '</td><td style="text-align:right">' + (parseFloat(lu.area)||0).toFixed(0) +
              '</td><td style="text-align:right">' + ((parseFloat(lu.coeff)||0)*(parseFloat(lu.area)||0)).toFixed(2) + '</td></tr>'
            ).join('')}
            <tr style="font-weight:700;border-top:2px solid var(--gray-300)">
              <td>합계</td><td></td>
              <td style="text-align:right">${r.landuses.reduce((s,l)=>s+(parseFloat(l.area)||0),0).toFixed(0)}</td>
              <td style="text-align:right">${r.landuses.reduce((s,l)=>s+(parseFloat(l.coeff)||0)*(parseFloat(l.area)||0),0).toFixed(2)}</td>
            </tr>
          </tbody>
        </table>
        <div class="formula" style="margin-top:6px">
          <b>C(총괄) = ${r.landuses.reduce((s,l)=>s+(parseFloat(l.coeff)||0)*(parseFloat(l.area)||0),0).toFixed(2)} / ${r.landuses.reduce((s,l)=>s+(parseFloat(l.area)||0),0).toFixed(0)} = ${_appliedC.toFixed(3)}</b>
        </div>
      ` : `
        <div class="indent2">유출계수 산정방식 : 간편법 (총괄유출계수 직접적용)</div>
        <table style="margin-left:30px">
          <thead><tr><th>구 분</th><th>적용값</th></tr></thead>
          <tbody>
            <tr><td>적용 유출계수</td><td><b>C = ${_appliedC.toFixed(2)}</b></td></tr>
          </tbody>
        </table>
      `}

      <div class="formula" style="margin-top:8px">
        적용C값 : ${_appliedC.toFixed(3)}
      </div>
      <div class="formula">
        <b>유출량 : Qd = 1/360 × ${_appliedC.toFixed(3)} × ${r.intensity.toFixed(2)} × ${r.cumulArea.toFixed(2)} = ${r.discharge.toFixed(3)} m³/sec</b>
      </div>

      <div class="section-title" style="margin-top:20px">6. 계획단면검토</div>
      <div class="indent">① 단면 조건 : ${dimStr}, 재질: ${getMaterialName(seg)}</div>
      ${r.flowRatio < 1.0 ? '<div class="indent2" style="color:var(--primary)">통수율: ' + (r.flowRatio * 100).toFixed(0) + '% 적용 (여유고 ' + ((1 - r.flowRatio) * 100).toFixed(0) + '%)</div>' : ''}
      ${s ? `
        <div class="indent">② 통수 유량 : Qi = A × V</div>
        <div class="indent2">A ( 단면적 ) = ${s.A.toFixed(4)} m² ${r.flowRatio < 1.0 ? '(통수율 ' + (r.flowRatio*100).toFixed(0) + '% 적용)' : ''}</div>
        <div class="indent2">V ( 유 속 ) = Manning 공식 적용 (m/sec)</div>
        <div class="formula">V = 1/n × R<sup>2/3</sup> × I<sup>1/2</sup></div>
        <div class="indent2">n = 조도계수 = ${n_val} (${getMaterialName(seg)})</div>
        <div class="indent2">R ( 경심 ) = A / P = ${s.A.toFixed(4)} / ${s.P.toFixed(4)} = ${s.R.toFixed(4)} m</div>
        ${r.naturalSlope !== r.appliedSlope ? `
          <div class="indent2">I = 적용구배 = ${slope.toFixed(3)} % (직접입력)</div>
          <div class="indent2" style="color:var(--gray-500);font-size:.78rem">※ 자연구배 = ${r.naturalSlope.toFixed(3)} % (관저고: EL.${seg.invertFrom} ~ EL.${seg.invertTo}, L=${getSegLength(seg)}m)</div>
        ` : `
          <div class="indent2">I = 동수구배 = ${slope.toFixed(3)} % (관저고: EL.${seg.invertFrom} ~ EL.${seg.invertTo}, L=${getSegLength(seg)}m)</div>
        `}
        <div class="indent2">R<sup>2/3</sup> = ${Math.pow(s.R, 2/3).toFixed(4)}</div>
        <div class="indent2">I<sup>1/2</sup> = ${Math.pow(slope/100, 0.5).toFixed(4)}</div>
        <div class="formula"><b>V = 1/${n_val} × ${Math.pow(s.R, 2/3).toFixed(4)} × ${Math.pow(slope/100, 0.5).toFixed(4)} = ${s.V.toFixed(2)} m/sec</b></div>
        <div class="formula"><b>∴ 통수 유량 : Qi = ${s.A.toFixed(4)} × ${s.V.toFixed(2)} = ${s.Q.toFixed(3)} m³/sec</b></div>

        <div class="section-title" style="margin-top:20px">7. 검토 결과</div>
        <div class="indent"><b>[ 계획단면 ]</b></div>
        <table style="margin-left:30px">
          <tr><td>우수유입량 (Qd)</td><td style="text-align:right"><b>${r.discharge.toFixed(3)} m³/sec</b></td></tr>
          <tr><td>통수유량 (Qi)</td><td style="text-align:right"><b>${s.Q.toFixed(3)} m³/sec</b></td></tr>
          <tr><td>유속</td><td style="text-align:right">${s.V.toFixed(2)} m/sec (기준: ${r.minV||0.6}~${r.maxV||3.0} m/s) → ${r.velocityCheck}</td></tr>
          <tr><td>유량 검토</td><td style="text-align:right;font-weight:700;color:${r.capacityCheck==='OK'?'var(--success)':'var(--danger)'}">
            Qi (${s.Q.toFixed(3)}) ${r.capacityCheck==='OK'?'≥':'<'} Qd (${r.discharge.toFixed(3)}) → ${r.capacityCheck}
          </td></tr>
          ${r.flowRatio < 1.0 ? '<tr><td>통수율</td><td style="text-align:right">' + (r.flowRatio*100).toFixed(0) + '% (여유고 ' + ((1-r.flowRatio)*100).toFixed(0) + '%)</td></tr>' : ''}
          ${r.naturalSlope !== r.appliedSlope ? '<tr><td>구배</td><td style="text-align:right">적용: ' + r.appliedSlope.toFixed(3) + '% / 자연: ' + r.naturalSlope.toFixed(3) + '%</td></tr>' : ''}
        </table>

        ${r.existSection ? `
          <div class="indent" style="margin-top:15px"><b>[ 기존단면 ]</b></div>
          <table style="margin-left:30px">
            <tr><td>관종</td><td style="text-align:right">${r.existSection.type} ${seg.existPipeType === 'circular' ? 'D' + seg.existDiameter + 'mm' : seg.existPipeType === 'box' ? seg.existBoxW + 'm×' + seg.existBoxH + 'm' : seg.existUWidth + 'm×' + seg.existUHeight + 'm'}</td></tr>
            <tr><td>구배</td><td style="text-align:right">${r.existSlope.toFixed(3)} %</td></tr>
            <tr><td>통수유량 (Qi)</td><td style="text-align:right"><b>${r.existSection.Q.toFixed(3)} m³/sec</b></td></tr>
            <tr><td>유속</td><td style="text-align:right">${r.existSection.V.toFixed(2)} m/sec</td></tr>
            <tr><td>유량 검토</td><td style="text-align:right;font-weight:700;color:${r.existCapacityCheck==='OK'?'var(--success)':'var(--danger)'}">
              Qi (${r.existSection.Q.toFixed(3)}) ${r.existCapacityCheck==='OK'?'≥':'<'} Qd (${r.discharge.toFixed(3)}) → ${r.existCapacityCheck}
            </td></tr>
          </table>
          <div class="indent" style="margin-top:10px"><b>[ 비교 ]</b></div>
          <table style="margin-left:30px">
            <thead><tr><th>구분</th><th>기존단면</th><th>계획단면</th><th>판정</th></tr></thead>
            <tbody>
              <tr><td>통수유량</td><td style="text-align:right">${r.existSection.Q.toFixed(3)} m³/s</td><td style="text-align:right">${s.Q.toFixed(3)} m³/s</td>
                <td style="text-align:center;font-weight:700;color:${s.Q > r.existSection.Q ? 'var(--success)' : 'var(--gray-500)'}">
                  ${s.Q > r.existSection.Q ? '↑ 개선' : s.Q < r.existSection.Q ? '↓ 감소' : '동일'}
                </td></tr>
              <tr><td>유속</td><td style="text-align:right">${r.existSection.V.toFixed(2)} m/s</td><td style="text-align:right">${s.V.toFixed(2)} m/s</td><td></td></tr>
              <tr><td>유량검토</td><td style="text-align:center;color:${r.existCapacityCheck==='OK'?'var(--success)':'var(--danger)'}">${r.existCapacityCheck}</td>
                <td style="text-align:center;color:${r.capacityCheck==='OK'?'var(--success)':'var(--danger)'}">${r.capacityCheck}</td><td></td></tr>
            </tbody>
          </table>
        ` : ''}
      ` : `
        <div class="alert alert-danger">관거제원이 입력되지 않았습니다.</div>
      `}
    </div>
  `;
}

// ============================================================
// 이벤트 핸들러
// ============================================================
function setTab(tab) {
  state.activeTab = tab;
  render();
}

function updateProject(key, value) {
  state.project[key] = value;
}

function updateSeg(idx, key, value) {
  state.segments[idx][key] = value;
  render();
}

function addSegment() {
  state.segments.push(createDefaultSegment());
  render();
}

function removeSegment(idx) {
  if (confirm('이 구간을 삭제하시겠습니까?')) {
    state.segments.splice(idx, 1);
    render();
  }
}

function duplicateSegment(idx) {
  const copy = JSON.parse(JSON.stringify(state.segments[idx]));
  copy.id = state.nextId++;
  copy.name = copy.name ? copy.name + ' (복사)' : '';
  state.segments.splice(idx + 1, 0, copy);
  render();
}

function exportJSON() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `수리계산_${state.project.name}_${state.project.date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON() {
  document.getElementById('fileInput').click();
}

function handleFileImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      Object.assign(state, imported);
      render();
      alert('데이터를 성공적으로 불러왔습니다.');
    } catch(err) {
      alert('파일 읽기 오류: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function bindEvents() {
  // 이벤트는 인라인으로 처리
}

// 초기 렌더링
render();
</script>
</body>
</html>
